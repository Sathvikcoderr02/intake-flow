<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intake Workflow</title>
    <style>
      /* Warm stone + copper: distinct from typical blue “AI dashboard” UIs */
      :root {
        color-scheme: light dark;
        --bg: #141210;
        --bg-elevated: #1a1815;
        --panel: #1f1c18;
        --border: #3d3730;
        --text: #f5f0e8;
        --muted: #9e9488;
        --accent: #c17f59;
        --accent-dim: #8a5a40;
        --accent-ink: #1a1410;
        --ok: #7fb89a;
        --warn: #d4a85c;
        --err: #d67a72;
        --ring: rgba(193, 127, 89, 0.45);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f3efe8;
          --bg-elevated: #ebe6dd;
          --panel: #fffdf9;
          --border: #e0d8ce;
          --text: #1c1a17;
          --muted: #6b645a;
          --accent: #a65d34;
          --accent-dim: #7a4528;
          --accent-ink: #fffaf5;
          --ok: #2f6f47;
          --warn: #8f6a24;
          --err: #9c3d36;
          --ring: rgba(166, 93, 52, 0.4);
          --shadow: 0 4px 24px rgba(28, 26, 23, 0.07);
        }
      }
      * {
        box-sizing: border-box;
      }
      html {
        margin: 0;
        width: 100%;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", ui-sans-serif, system-ui, -apple-system, Roboto,
          Helvetica, Arial, sans-serif;
        background: radial-gradient(
            120% 80% at 100% 0%,
            rgba(193, 127, 89, 0.08),
            transparent 55%
          ),
          var(--bg);
        color: var(--text);
        line-height: 1.5;
        overflow-x: hidden;
      }
      header {
        padding: 1.25rem 0;
        border-bottom: 1px solid var(--border);
        border-top: 3px solid var(--accent);
        background: linear-gradient(
          165deg,
          var(--panel) 0%,
          var(--bg-elevated) 100%
        );
        box-shadow: var(--shadow);
      }
      /* One centered column: avoids drift from nested width wrappers */
      .page-shell {
        box-sizing: border-box;
        width: min(100%, 44rem);
        margin-left: auto;
        margin-right: auto;
        padding-left: clamp(1rem, 4vw, 1.5rem);
        padding-right: clamp(1rem, 4vw, 1.5rem);
        min-width: 0;
      }
      header h1 {
        margin: 0 0 0.35rem;
        font-size: 1.28rem;
        font-weight: 650;
        letter-spacing: -0.02em;
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        text-align: center;
      }
      header p {
        margin: 0 auto;
        color: var(--muted);
        font-size: 0.95rem;
        max-width: 40ch;
        text-align: center;
      }
      main {
        display: grid;
        gap: 1rem;
        padding-top: 1.5rem;
        padding-bottom: 2.5rem;
        min-width: 0;
        width: 100%;
      }
      label {
        font-weight: 600;
        font-size: 0.9rem;
      }
      .card > label {
        display: block;
        text-align: center;
        margin-bottom: 0.35rem;
      }
      textarea {
        width: 100%;
        min-height: 220px;
        padding: 0.75rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg-elevated);
        color: var(--text);
        font-size: 0.95rem;
        resize: vertical;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      textarea:focus-visible {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--ring);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }
      .card > .row {
        justify-content: center;
      }
      #historyCard > p.muted {
        text-align: center;
      }
      button {
        appearance: none;
        border: 1px solid var(--accent-dim);
        background: linear-gradient(
          180deg,
          var(--accent) 0%,
          var(--accent-dim) 100%
        );
        color: var(--accent-ink);
        padding: 0.55rem 1.1rem;
        border-radius: 9px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.01em;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.12) inset;
        transition: filter 0.15s ease, box-shadow 0.15s ease;
      }
      button:hover:not(:disabled) {
        filter: brightness(1.06);
      }
      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--ring), 0 1px 0 rgba(255, 255, 255, 0.12) inset;
      }
      button.secondary {
        background: transparent;
        color: var(--text);
        border-color: var(--border);
        box-shadow: none;
      }
      button.secondary:hover:not(:disabled) {
        filter: none;
        background: rgba(193, 127, 89, 0.1);
        border-color: var(--accent-dim);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.15rem;
        background: var(--panel);
        box-shadow: var(--shadow);
        min-width: 0;
        max-width: 100%;
      }
      .card h2 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
        font-weight: 650;
        letter-spacing: -0.01em;
        color: var(--text);
        font-family: ui-serif, Georgia, "Times New Roman", serif;
        text-align: center;
      }
      #content {
        min-width: 0;
        max-width: 100%;
      }
      #content p {
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .kv {
        display: grid;
        gap: 0.35rem 1rem;
        grid-template-columns: minmax(0, 9.5rem) minmax(0, 1fr);
        font-size: 0.92rem;
      }
      .kv div:nth-child(odd) {
        color: var(--muted);
      }
      .kv div:nth-child(even) {
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      pre {
        margin: 0;
        padding: 0.75rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg-elevated);
        overflow: auto;
        font-size: 0.82rem;
        max-height: 320px;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        box-sizing: border-box;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
      .badge {
        display: inline-block;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        font-size: 0.78rem;
        border: 1px solid var(--accent-dim);
        color: var(--accent);
        background: rgba(193, 127, 89, 0.12);
        font-weight: 600;
      }
      @media (prefers-color-scheme: light) {
        .badge {
          background: rgba(166, 93, 52, 0.1);
        }
      }
      .error {
        color: var(--err);
        white-space: pre-wrap;
      }
      .muted {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .history-list {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        max-height: 280px;
        overflow-y: auto;
      }
      .history-item {
        width: 100%;
        text-align: left;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.2rem;
        padding: 0.65rem 0.8rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg-elevated);
        color: var(--text);
        font: inherit;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease;
      }
      .history-item:hover {
        border-color: var(--accent-dim);
        background: rgba(193, 127, 89, 0.1);
      }
      .history-meta {
        font-size: 0.78rem;
        color: var(--muted);
      }
      .history-preview {
        font-size: 0.88rem;
        line-height: 1.35;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header>
        <h1>AI-assisted intake workflow</h1>
        <p>
          Classify and extract with Gemini; validate, risk, and routing are
          rule-based.
        </p>
      </header>
      <main>
      <div class="card">
        <label for="req">Business request</label>
        <textarea id="req" placeholder="Paste email or ticket text…"></textarea>
        <div class="row" style="margin-top: 0.65rem">
          <button id="submit" type="button">Run workflow</button>
          <button id="sample" class="secondary" type="button">
            Load sample refund
          </button>
          <span id="status" class="muted"></span>
        </div>
      </div>

      <div id="historyCard" class="card" style="display: none">
        <h2>Session history</h2>
        <p class="muted" style="margin: 0 0 0.75rem">
          Last 20 successful runs in this tab only (
          <code>sessionStorage</code>
          ). Cleared when the tab closes.
        </p>
        <div id="historyList" class="history-list"></div>
        <div class="row" style="margin-top: 0.65rem">
          <button id="clearHistory" class="secondary" type="button">
            Clear history
          </button>
        </div>
      </div>

      <div id="out" class="card" style="display: none">
        <h2>Result</h2>
        <div id="content"></div>
      </div>
    </main>
    </div>
    <script>
      const HISTORY_KEY = "intake_flow_history_v1";
      const HISTORY_LIMIT = 20;

      const sample = `Subject: Refund request for failed payment
Hello Team,
I am Priya Sharma from Acme Corp. We made a payment of INR 42,000 on 10-May2026 for invoice INV-9081, but the transaction failed and the amount was still
deducted from our bank account.
Please process the refund as soon as possible.
Customer ID: CUST-7781
Payment Reference: PAY-44291
Contact Email: priya@acmecorp.com
Regards,
Priya`;

      const el = (id) => document.getElementById(id);
      const status = el("status");
      const out = el("out");
      const content = el("content");

      function readHistory() {
        try {
          const raw = sessionStorage.getItem(HISTORY_KEY);
          if (!raw) return [];
          const arr = JSON.parse(raw);
          return Array.isArray(arr) ? arr : [];
        } catch (_) {
          return [];
        }
      }

      function writeHistory(items) {
        sessionStorage.setItem(
          HISTORY_KEY,
          JSON.stringify(items.slice(0, HISTORY_LIMIT))
        );
      }

      function pushHistory(request_text, data) {
        const preview = (request_text || "")
          .trim()
          .replace(/\s+/g, " ")
          .slice(0, 140);
        const entry = {
          id:
            typeof crypto !== "undefined" && crypto.randomUUID
              ? crypto.randomUUID()
              : String(Date.now()) + Math.random().toString(16).slice(2),
          savedAt: Date.now(),
          requestPreview: preview || "(empty request)",
          request_text,
          result: data,
        };
        const next = [
          entry,
          ...readHistory().filter((h) => h.id !== entry.id),
        ].slice(0, HISTORY_LIMIT);
        writeHistory(next);
        renderHistoryPanel();
      }

      function clearHistory() {
        sessionStorage.removeItem(HISTORY_KEY);
        renderHistoryPanel();
      }

      function formatHistoryTime(ts) {
        return new Date(ts).toLocaleString(undefined, {
          dateStyle: "short",
          timeStyle: "short",
        });
      }

      function renderHistoryPanel() {
        const card = el("historyCard");
        const listEl = el("historyList");
        const items = readHistory();
        if (!items.length) {
          card.style.display = "none";
          listEl.innerHTML = "";
          return;
        }
        card.style.display = "block";
        listEl.innerHTML = items
          .map((h) => {
            const idAttr = escapeHtml(h.id);
            const t = escapeHtml(formatHistoryTime(h.savedAt));
            const rt = escapeHtml(h.result?.request_type || "");
            const prev = escapeHtml(h.requestPreview || "");
            return `<button type="button" class="history-item" data-id="${idAttr}"><span class="history-meta">${t} &middot; <strong>${rt}</strong></span><span class="history-preview">${prev}</span></button>`;
          })
          .join("");
        listEl.querySelectorAll(".history-item").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-id");
            const found = readHistory().find((h) => h.id === id);
            if (!found || !found.result) return;
            el("req").value = found.request_text || "";
            showIntakeResult(found.result, { fromHistory: true });
            status.textContent = "Loaded from history.";
          });
        });
      }

      function buildResultMarkup(data, opts) {
        const v = data.validation || {};
        const rp = data.risk_priority || {};
        const ext = data.extracted?.structured || {};
        const extRows = Object.keys(ext).length
          ? Object.entries(ext)
              .map(
                ([k, val]) =>
                  `<div>${escapeHtml(k)}</div><div>${escapeHtml(
                    String(val)
                  )}</div>`
              )
              .join("")
          : `<div class="muted" style="grid-column: 1 / -1">No structured fields</div>`;

        const trace = (data.trace || [])
          .map(
            (t) =>
              `<div><span class="badge">${escapeHtml(
                t.status
              )}</span> ${escapeHtml(t.step)}</div><div>${escapeHtml(
                t.detail
              )}</div>`
          )
          .join("");

        const banner = opts.fromHistory
          ? `<p class="muted" style="margin:0 0 0.75rem">Showing a saved run from this tab's history.</p>`
          : "";

        return `
            ${banner}
            <div class="row" style="margin-bottom: 0.75rem">
              <button id="pdfBtn" class="secondary" type="button">
                Download result as PDF
              </button>
            </div>
            <div class="kv">
              <div>Request type</div><div><strong>${escapeHtml(
                data.request_type || ""
              )}</strong></div>
              <div>Confidence</div><div>${escapeHtml(
                String(data.classification?.confidence ?? "")
              )}</div>
              <div>Classification summary</div><div>${escapeHtml(
                data.classification?.summary || ""
              )}</div>
            </div>
            <h2 style="margin-top:1rem">Extracted information</h2>
            <div class="kv">${extRows}</div>
            ${
              data.extracted?.notes
                ? `<p class="muted" style="margin-top:0.5rem"><strong>Notes:</strong> ${escapeHtml(
                    data.extracted.notes
                  )}</p>`
                : ""
            }
            <h2 style="margin-top:1rem">Validation</h2>
            <div class="kv">
              <div>Complete</div><div><strong>${
                v.complete ? "Yes" : "No"
              }</strong></div>
              <div>Missing</div><div>${escapeHtml(
                (v.missing_fields || []).join(", ") || "\u2014"
              )}</div>
              <div>Rationale</div><div>${escapeHtml(v.rationale || "")}</div>
            </div>
            <h2 style="margin-top:1rem">Risk / priority</h2>
            <div class="kv">
              <div>Risk</div><div><strong>${escapeHtml(
                String(rp.risk_level || "")
              )}</strong></div>
              <div>Priority</div><div><strong>${escapeHtml(
                String(rp.priority || "")
              )}</strong></div>
            </div>
            <h2 style="margin-top:1rem">Recommended next action</h2>
            <p style="margin:0">${escapeHtml(data.recommended_action || "")}</p>
            <h2 style="margin-top:1rem">Workflow trace</h2>
            <div class="kv">${trace}</div>
            <h2 style="margin-top:1rem">Raw JSON</h2>
            <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
          `;
      }

      function showIntakeResult(data, opts = {}) {
        window.__lastIntake = data;
        content.innerHTML = buildResultMarkup(data, opts);
        out.style.display = "block";
        const pdfBtn = el("pdfBtn");
        if (pdfBtn) {
          pdfBtn.addEventListener("click", () =>
            downloadIntakePdf(window.__lastIntake)
          );
        }
      }

      el("sample").addEventListener("click", () => {
        el("req").value = sample;
      });

      el("clearHistory").addEventListener("click", () => {
        clearHistory();
        status.textContent = "History cleared.";
      });

      el("submit").addEventListener("click", async () => {
        const request_text = el("req").value;
        out.style.display = "none";
        content.innerHTML = "";
        status.textContent = "Running…";
        el("submit").disabled = true;
        try {
          const res = await fetch("/api/process", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ request_text }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.detail || res.statusText || "Request failed");
          }
          showIntakeResult(data, {});
          pushHistory(request_text, data);
          status.textContent = "Done.";
        } catch (e) {
          status.textContent = "";
          out.style.display = "block";
          content.innerHTML = `<p class="error">${escapeHtml(
            e.message || String(e)
          )}</p>`;
        } finally {
          el("submit").disabled = false;
        }
      });

      async function downloadIntakePdf(payload) {
        const btn = el("pdfBtn");
        if (!payload || !btn) return;
        const prev = btn.textContent;
        btn.disabled = true;
        btn.textContent = "Building PDF…";
        try {
          const res = await fetch("/api/export/pdf", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!res.ok) {
            let msg = res.statusText;
            try {
              const err = await res.json();
              if (err.detail) msg = String(err.detail);
            } catch (_) {}
            throw new Error(msg);
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `intake-workflow-${Date.now()}.pdf`;
          a.rel = "noopener";
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        } catch (err) {
          status.textContent = err.message || String(err);
        } finally {
          btn.disabled = false;
          btn.textContent = prev;
        }
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      renderHistoryPanel();
    </script>
  </body>
</html>
